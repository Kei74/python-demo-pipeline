services:

  postgres:
    image: postgres:15
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "password"
      POSTGRES_DB: "customer_db"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  mock-server:
    build:
      context: ./mock-server
      dockerfile: ./Dockerfile
    ports: ["5000:5000"]

  pipeline-service:
    build:
      context: ./pipeline-service
      dockerfile: ./Dockerfile
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/customer_db
    depends_on: 
      postgres:
        condition: service_healthy
      mock-server:
        condition: service_started